name: Deploy to Hostinger

on:
  push:
    branches:
      - enterprise-rebuild
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
        run: npm run build

      - name: Create deployment ZIP
        run: |
          mkdir -p blwebsite-main
          rsync -a --exclude='node_modules' --exclude='.git' --exclude='.env*' \
            --exclude='.next/cache' \
            . blwebsite-main/
          zip -r blwebsite-deploy.zip blwebsite-main/
          ls -lh blwebsite-deploy.zip

      - name: FTP Deploy ZIP to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 92.112.189.250
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /public_html/
          include: "blwebsite-deploy.zip"
          dangerous-clean-slate: false
